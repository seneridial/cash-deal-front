<aside class="sidebar">
  <div class="sidebar__logo">
    <div class="sidebar__logo-box"><span>CASH<br>DEAL</span></div>
    <span class="sidebar__logo-name">Cash Deal</span>
  </div>

  <nav class="sidebar__nav">
    <span class="sidebar__section">Principal</span>
    <a routerLink="/dashboard" routerLinkActive="active" class="sidebar__item">
      📊 Dashboard
    </a>

    <span class="sidebar__section">Gestion</span>

    <a routerLink="/stocks" routerLinkActive="active" class="sidebar__item"
       *ngIf="isGerant">
      📦 Stocks
    </a>

    <a routerLink="/ventes" routerLinkActive="active" class="sidebar__item">
      🧾 Ventes
    </a>

    <a routerLink="/achats" routerLinkActive="active" class="sidebar__item"
       *ngIf="isGerant">
      🚚 Achats
    </a>

    <a routerLink="/clients" routerLinkActive="active" class="sidebar__item">
      👥 Clients
    </a>

    <a routerLink="/factures" routerLinkActive="active" class="sidebar__item">
      🧾 Factures
    </a>

    <span class="sidebar__section">Rapports</span>
    <a routerLink="/statistiques" routerLinkActive="active" class="sidebar__item">
      📈 Statistiques
    </a>

    <span class="sidebar__section">Administration</span>
<a routerLink="/utilisateurs" routerLinkActive="active" class="sidebar__item"
   *ngIf="isAdmin">
  👤 Utilisateurs
</a>
  </nav>

  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__avatar">{{ initiales }}</div>
      <div>
        <div class="sidebar__user-name">{{ currentUser?.name }}</div>
        <div class="sidebar__user-role">{{ currentUser?.role }}</div>
      </div>
      <button class="sidebar__logout" (click)="logout()">⏻</button>
    </div>
  </div>
</aside>
